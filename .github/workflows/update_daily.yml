name: 일별 데이터 갱신

on:
  schedule:
    - cron: '0 18 * * 1-5'   # 평일 오전 3시 KST (= UTC 18:00)
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 매크로 지표 업데이트
        run: python -X utf8 update_macro.py

      - name: 경제 캘린더 업데이트
        run: python -X utf8 update_calendar.py

