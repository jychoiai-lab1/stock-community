name: 시장 데이터 빠른 갱신 (ticker + 종목)

on:
  workflow_dispatch:   # cron-job.org가 외부에서 트리거

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 주요 지수 업데이트
        run: python -X utf8 update_ticker.py

      - name: 주요 종목 업데이트
        run: python -X utf8 update_stock_prices.py
