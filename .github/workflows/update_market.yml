name: 섹터 & 공탐 갱신 (30분)

on:
  schedule:
    - cron: '*/30 * * * *'   # 매 30분
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 섹터 퍼포먼스 업데이트
        run: python -X utf8 update_sector.py

      - name: 공포·탐욕 지수 업데이트
        run: python -X utf8 update_fear_greed.py
