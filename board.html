<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자유게시판 - 겁쟁이리서치</title>
  <meta name="description" content="겁쟁이리서치 자유게시판. 주식·경제에 관한 이야기를 자유롭게 나눠보세요." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="겁쟁이리서치" />
  <meta property="og:title" content="자유게시판 - 겁쟁이리서치" />
  <meta property="og:description" content="주식·경제에 관한 이야기를 자유롭게 나눠보세요" />
  <meta property="og:url" content="https://stock-community-woad.vercel.app/board.html" />
  <meta name="twitter:card" content="summary" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        겁쟁이리서치
      </a>
      <nav class="nav">
        <a href="index.html" class="nav-link">대시보드</a>
        <a href="briefings.html" class="nav-link">브리핑</a>
        <a href="board.html" class="nav-link active">게시판</a>
      </nav>
    </div>
  </header>
  <main class="main-content">
    <div class="container">
      <!-- 글쓰기 폼 -->
      <div class="board-form">
        <h2 class="section-title" style="margin-bottom:16px;">자유게시판</h2>
        <input type="text" id="nickname" class="board-input" placeholder="닉네임" maxlength="20" />
        <textarea id="boardContent" class="board-contenteditable" placeholder="자유롭게 글을 남겨주세요" maxlength="300" oninput="onPostInput()" style="resize:none;height:100px;"></textarea>
        <div class="board-form-footer">
          <span class="board-char-count" id="charCount">0 / 300</span>
          <button class="board-submit" onclick="submitPost()">등록</button>
        </div>
      </div>
      <!-- 게시글 목록 -->
      <div id="boardList" style="margin-top:4px;">
        <div class="loading-spinner"><div class="spinner"></div><p>불러오는 중...</p></div>
      </div>
    </div>
  </main>
  <nav class="mobile-nav">
    <a href="index.html" class="mobile-nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      대시보드
    </a>
    <a href="briefings.html" class="mobile-nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      브리핑
    </a>
    <a href="board.html" class="mobile-nav-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      게시판
    </a>
  </nav>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="toast.js"></script>
  <script src="board.js"></script>
  <script src="animations.js"></script>
</body>
</html>
