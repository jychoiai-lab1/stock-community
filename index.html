<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>겁쟁이리서치 — 마켓 대시보드</title>
  <meta name="description" content="주요 지수, 섹터 퍼포먼스, 공포탐욕지수, 경제 캘린더를 한눈에" />
  <meta property="og:title" content="겁쟁이리서치 — 마켓 대시보드" />
  <meta property="og:description" content="Finviz 급 데이터를 Robinhood 스타일로" />
  <meta property="og:url" content="https://stock-community-woad.vercel.app" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
        겁쟁이리서치
      </a>
      <nav class="nav">
        <a href="index.html" class="nav-link active">대시보드</a>
        <a href="briefings.html" class="nav-link">브리핑</a>
        <a href="board.html" class="nav-link">게시판</a>
      </nav>
      <div class="header-right">
        <span class="live-time" id="liveTime"></span>
        <span class="live-dot"></span>
      </div>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main class="main-content">
    <div class="container">

      <!-- ① 주요 지수 카드 -->
      <section class="dash-section">
        <div class="section-head">
          <h2 class="section-title">주요 지수</h2>
          <span class="update-hint" id="indexUpdateTime"></span>
        </div>
        <div class="index-grid" id="indexGrid">
          <div class="index-card skeleton"></div>
          <div class="index-card skeleton"></div>
          <div class="index-card skeleton"></div>
          <div class="index-card skeleton"></div>
          <div class="index-card skeleton"></div>
          <div class="index-card skeleton"></div>
          <div class="index-card skeleton"></div>
          <div class="index-card skeleton"></div>
        </div>
      </section>

      <!-- ② 섹터 + 매크로 -->
      <section class="dash-section">
        <div class="two-col">

          <!-- 섹터 퍼포먼스 -->
          <div class="panel" id="sectorPanel">
            <div class="panel-head">
              <h3 class="panel-title">섹터 퍼포먼스</h3>
              <div class="pill-tabs" id="sectorTabs">
                <button class="pill active" data-period="day">1D</button>
                <button class="pill" data-period="week">1W</button>
                <button class="pill" data-period="month">1M</button>
                <button class="pill" data-period="year">1Y</button>
              </div>
            </div>
            <div class="sector-list" id="sectorList">
              <div class="loading-state"><div class="spinner"></div><span>불러오는 중...</span></div>
            </div>
          </div>

          <!-- 매크로 컬럼 -->
          <div class="macro-col">

            <!-- 공포·탐욕 -->
            <div class="panel fear-panel">
              <div class="panel-head">
                <h3 class="panel-title">공포·탐욕 지수</h3>
                <span class="update-hint" id="fgUpdated"></span>
              </div>
              <div class="fg-wrap">
                <svg viewBox="0 0 120 70" class="fg-svg">
                  <defs>
                    <linearGradient id="gGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%"   stop-color="#ff5252"/>
                      <stop offset="25%"  stop-color="#ff8c42"/>
                      <stop offset="50%"  stop-color="#f5a623"/>
                      <stop offset="75%"  stop-color="#a8d97f"/>
                      <stop offset="100%" stop-color="#26d97f"/>
                    </linearGradient>
                  </defs>
                  <path d="M 12 65 A 48 48 0 0 1 108 65" fill="none" stroke="#1e2030" stroke-width="10" stroke-linecap="round"/>
                  <path d="M 12 65 A 48 48 0 0 1 108 65" fill="none" stroke="url(#gGrad)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
                  <line id="fgNeedle" x1="60" y1="65" x2="60" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
                  <circle cx="60" cy="65" r="4" fill="#111118"/>
                  <circle cx="60" cy="65" r="2.2" fill="white"/>
                </svg>
                <div class="fg-labels">
                  <span>공포</span><span>중립</span><span>탐욕</span>
                </div>
                <div class="fg-center">
                  <div class="fg-value" id="fgValue">--</div>
                  <div class="fg-label" id="fgLabel">로딩 중</div>
                </div>
              </div>
            </div>

            <!-- 매크로 지표 -->
            <div class="panel">
              <div class="panel-head">
                <h3 class="panel-title">매크로 지표</h3>
              </div>
              <div class="macro-stats" id="macroStats">
                <div class="loading-state"><div class="spinner"></div><span>불러오는 중...</span></div>
              </div>
            </div>

          </div><!-- /macro-col -->
        </div>
      </section>

      <!-- ③ 캘린더 + 주요 종목 -->
      <section class="dash-section">
        <div class="two-col">

          <!-- 경제 캘린더 -->
          <div class="panel">
            <div class="panel-head">
              <h3 class="panel-title">경제 캘린더</h3>
              <span class="update-hint">향후 30일</span>
            </div>
            <div class="cal-list" id="calendarList">
              <div class="loading-state"><div class="spinner"></div><span>불러오는 중...</span></div>
            </div>
          </div>

          <!-- 주요 종목 -->
          <div class="panel">
            <div class="panel-head">
              <h3 class="panel-title">주요 종목</h3>
              <div class="pill-tabs" id="marketTabs">
                <button class="pill active" data-market="us">미국</button>
                <button class="pill" data-market="kr">한국</button>
                <button class="pill" data-market="crypto">코인</button>
              </div>
            </div>
            <div class="stock-list" id="stockList">
              <div class="loading-state"><div class="spinner"></div><span>불러오는 중...</span></div>
            </div>
          </div>

        </div>
      </section>

      <div class="footer-note">
        데이터는 장 마감 기준 · 15분~1시간 지연 · 투자 참고용
      </div>

    </div>
  </main>

  <!-- ── 모바일 하단 네비 ── -->
  <nav class="mobile-nav">
    <a href="index.html" class="mobile-nav-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      대시보드
    </a>
    <a href="briefings.html" class="mobile-nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      브리핑
    </a>
    <a href="board.html" class="mobile-nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      게시판
    </a>
  </nav>

  <script src="config.js"></script>
  <script src="toast.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
