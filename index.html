<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>겁쟁이리서치</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">📈 겁쟁이리서치</div>
      <nav class="nav">
        <a href="index.html" class="nav-link active">홈</a>
        <a href="stocks.html" class="nav-link">주식 현황</a>
        <a href="board.html" class="nav-link">자유게시판</a>
      </nav>
    </div>
  </header>
  <main class="main">
    <div class="container-wide">
      <!-- 커스텀 티커 테이프 -->
      <div class="ticker-tape">
        <div class="ticker-track" id="tickerTrack">
          <span class="ticker-item"><span class="ticker-name">로딩 중...</span></span>
        </div>
      </div>
      <div class="ticker-refresh-note">🕐 1시간마다 자동 갱신</div>
      <div class="layout">
        <div class="main-col">
          <!-- 탭 바 -->
          <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('briefing', this)">브리핑</button>
            <button class="tab-btn" onclick="switchTab('crypto', this)">🪙 암호화폐</button>
          </div>

          <!-- 브리핑 탭 -->
          <section class="tab-panel" id="tab-briefing">
            <div class="posts-header">
              <div style="display:flex;align-items:center;gap:10px;">
                <span class="refresh-note">🕒 매일 3시 갱신</span>
                <span class="posts-count" id="postsCount"></span>
              </div>
            </div>
            <div class="post-list" id="postList">
              <div class="loading-spinner"><div class="spinner"></div><p>불러오는 중...</p></div>
            </div>
          </section>

          <!-- 암호화폐 탭 (준비 중) -->
          <section class="tab-panel" id="tab-crypto" style="display:none">
            <div class="empty-state" style="padding:80px 20px;">
              <div class="empty-state-icon">🪙</div>
              <div class="empty-state-text">준비 중입니다</div>
            </div>
          </section>
        </div>
        <aside class="sidebar">
          <!-- 공포·탐욕 지수 -->
          <div class="widget-box">
            <div class="widget-title">😰 공포·탐욕 지수</div>
            <svg viewBox="0 0 100 58" class="fg-svg">
              <defs>
                <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#f87171"/>
                  <stop offset="50%" stop-color="#fbbf24"/>
                  <stop offset="100%" stop-color="#4ade80"/>
                </linearGradient>
              </defs>
              <path d="M 10 54 A 40 40 0 0 1 90 54" fill="none" stroke="#1e2535" stroke-width="9" stroke-linecap="round"/>
              <path d="M 10 54 A 40 40 0 0 1 90 54" fill="none" stroke="url(#gaugeGrad)" stroke-width="9" stroke-linecap="round" opacity="0.85"/>
              <line id="fgNeedle" x1="50" y1="54" x2="50" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
              <circle cx="50" cy="54" r="3.5" fill="#161b27"/>
              <circle cx="50" cy="54" r="2" fill="white"/>
            </svg>
            <div class="fg-center">
              <span class="fg-value" id="fgValue">--</span>
              <span class="fg-label" id="fgLabel">로딩 중</span>
            </div>
            <div class="fg-updated" id="fgUpdated"></div>
          </div>
          <!-- 주요 일정 -->
          <div class="widget-box">
            <div class="widget-title">📅 주요 일정</div>
            <div id="calList"><div class="cal-empty">로딩 중...</div></div>
          </div>
          <!-- 특별 분석 종목 -->
          <div class="widget-box">
            <div class="widget-title">🔬 특별 분석 종목</div>
            <div id="specialTickerList">
              <div class="loading-spinner" style="padding:16px 0"><div class="spinner"></div></div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
  <script src="animations.js"></script>
</body>
</html>
