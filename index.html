<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>겁쟁이리서치</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">📈 겁쟁이리서치</div>
      <nav class="nav">
        <a href="index.html" class="nav-link active">홈</a>
        <a href="stocks.html" class="nav-link">주식 현황</a>
        <a href="board.html" class="nav-link">자유게시판</a>
      </nav>
    </div>
  </header>
  <main class="main">
    <div class="container-wide">
      <!-- 커스텀 티커 테이프 -->
      <div class="ticker-tape">
        <div class="ticker-track" id="tickerTrack">
          <span class="ticker-item"><span class="ticker-name">로딩 중...</span></span>
        </div>
      </div>
      <div class="ticker-refresh-note">🕐 1시간마다 자동 갱신</div>
      <div class="layout">
        <div class="main-col">
          <section class="posts-section">
            <div class="posts-header">
              <h2 class="section-title">브리핑</h2>
              <div style="display:flex;align-items:center;gap:10px;">
                <span class="refresh-note">🕒 매일 3시 갱신</span>
                <span class="posts-count" id="postsCount"></span>
              </div>
            </div>
            <div class="post-list" id="postList">
              <div class="loading-spinner"><div class="spinner"></div><p>불러오는 중...</p></div>
            </div>
          </section>
        </div>
        <aside class="sidebar">
          <div class="sidebar-title">🔬 특별 분석 종목</div>
          <div id="specialTickerList">
            <div class="loading-spinner"><div class="spinner"></div></div>
          </div>
        </aside>
      </div>
    </div>
  </main>
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
