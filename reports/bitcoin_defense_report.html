<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전략적 자산 비트코인 — 방산의 언어로 말하다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #080a0e;
  --bg-card: #0e1018;
  --bg-card-hover: #13151f;
  --bg-surface: #161820;
  --text-primary: #e8e4d9;
  --text-secondary: #7a7b8a;
  --text-tertiary: #3a3b4a;
  --border: rgba(255,255,255,0.05);
  --border-hover: rgba(255,255,255,0.1);
  --gold: #c9a84c;
  --gold-bright: #f0c060;
  --gold-dim: rgba(201,168,76,0.12);
  --gold-glow: rgba(201,168,76,0.06);
  --orange: #e07840;
  --orange-dim: rgba(224,120,64,0.12);
  --blue: #4a8cbf;
  --blue-dim: rgba(74,140,191,0.12);
  --red: #c05050;
  --red-dim: rgba(192,80,80,0.1);
  --green: #5a9e72;
  --green-dim: rgba(90,158,114,0.12);
  --radius: 8px;
  --radius-lg: 14px;
  --font-body: 'Noto Sans KR', sans-serif;
  --font-display: 'DM Serif Display', serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-impact: 'Bebas Neue', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  line-height: 1.75;
  font-size: 14.5px;
  overflow-x: hidden;
}

/* 배경 노이즈 텍스처 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ─── HEADER ─── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(8,10,14,0.88);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 54px;
}

.logo {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.logo em { color: var(--text-tertiary); font-style: normal; }

.header-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-tertiary);
  letter-spacing: 1px;
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 4px;
}

/* ─── NAV ─── */
.nav-strip {
  position: fixed;
  top: 54px; left: 0; right: 0;
  z-index: 99;
  background: rgba(8,10,14,0.94);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-strip::-webkit-scrollbar { display: none; }

.nav-tabs {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 28px;
  display: flex;
  gap: 0;
  min-width: max-content;
}

.nav-tab {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 400;
  color: var(--text-tertiary);
  background: transparent;
  border: none;
  padding: 13px 18px;
  cursor: pointer;
  white-space: nowrap;
  position: relative;
  transition: color 0.2s;
  letter-spacing: 0.2px;
}
.nav-tab:hover { color: var(--text-secondary); }
.nav-tab.active {
  color: var(--gold);
  font-weight: 500;
}
.nav-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 18px; right: 18px;
  height: 1.5px;
  background: var(--gold);
  border-radius: 2px 2px 0 0;
}

/* ─── MAIN ─── */
.main {
  max-width: 1000px;
  margin: 0 auto;
  padding: 126px 28px 80px;
  position: relative;
  z-index: 1;
}

.section { display: none; animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1); }
.section.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── SEC HEADER ─── */
.sec-header { margin-bottom: 44px; }

.sec-eyebrow {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.sec-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-tertiary);
  letter-spacing: 3px;
}

.sec-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 3px 8px;
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 3px;
}

.gold-rule {
  height: 1px;
  background: linear-gradient(90deg, var(--gold), transparent);
  margin-bottom: 20px;
  width: 120px;
}

.sec-title {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 400;
  color: var(--text-primary);
  line-height: 1.25;
  letter-spacing: -0.3px;
  margin-bottom: 14px;
}

.sec-title em {
  font-style: italic;
  color: var(--gold);
}

.sec-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.75;
  max-width: 620px;
}

/* ─── HERO CARD ─── */
.hero-card {
  background: linear-gradient(135deg, #0e1018 0%, #131620 100%);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: var(--radius-lg);
  padding: 40px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.hero-card::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.hero-quote {
  font-family: var(--font-display);
  font-size: 22px;
  font-style: italic;
  color: var(--gold-bright);
  line-height: 1.5;
  margin-bottom: 16px;
}

.hero-source {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 1.5px;
}

/* ─── CARD ─── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  margin-bottom: 14px;
  transition: border-color 0.25s, background 0.25s;
}
.card:hover {
  border-color: var(--border-hover);
  background: var(--bg-card-hover);
}

.card-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-tertiary);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.card-title {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ─── TIMELINE ─── */
.timeline { display: flex; flex-direction: column; gap: 0; }

.tl-item {
  display: grid;
  grid-template-columns: 80px 20px 1fr;
  gap: 0 16px;
  position: relative;
}

.tl-year {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  padding-top: 2px;
  text-align: right;
}

.tl-spine {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tl-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  background: var(--gold-dim);
  flex-shrink: 0;
  margin-top: 4px;
}

.tl-line {
  width: 1px;
  flex: 1;
  background: var(--border);
  min-height: 24px;
}

.tl-content { padding-bottom: 28px; }

.tl-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.tl-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* ─── METRICS ─── */
.metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.metric {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.metric-label {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}

.metric-value {
  font-family: var(--font-impact);
  font-size: 28px;
  letter-spacing: 1px;
  line-height: 1;
  margin-bottom: 4px;
}

.metric-sub {
  font-size: 11px;
  color: var(--text-secondary);
}

/* ─── COMPARISON TABLE ─── */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-bottom: 14px;
}

.compare-table th {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-tertiary);
  text-align: left;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 400;
}

.compare-table td {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text-secondary);
  vertical-align: top;
}

.compare-table tr:hover td { background: rgba(255,255,255,0.015); }
.compare-table td:first-child { color: var(--text-primary); font-weight: 500; }

/* ─── HIGHLIGHT BOX ─── */
.highlight {
  background: var(--gold-glow);
  border: 1px solid rgba(201,168,76,0.15);
  border-left: 3px solid var(--gold);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 16px;
}

.highlight-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.highlight p {
  font-size: 13.5px;
  color: var(--text-secondary);
  line-height: 1.75;
}

.highlight strong { color: var(--text-primary); }

/* ─── STATUS ROW ─── */
.status-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 13px;
  color: var(--text-secondary);
}
.status-row:last-child { border-bottom: none; }

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 6px;
}

/* ─── QUOTE BLOCK ─── */
.quote-block {
  background: var(--bg-surface);
  border-radius: var(--radius);
  padding: 24px 28px;
  margin-bottom: 14px;
  position: relative;
}

.quote-block::before {
  content: '"';
  font-family: var(--font-display);
  font-size: 64px;
  color: rgba(201,168,76,0.12);
  position: absolute;
  top: -4px; left: 16px;
  line-height: 1;
}

.quote-text {
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.8;
  margin-bottom: 10px;
  padding-left: 8px;
}

.quote-attr {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 1.5px;
  padding-left: 8px;
}

/* ─── POW/POS VISUAL ─── */
.pow-pos-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

.pow-card {
  border-radius: var(--radius);
  padding: 24px;
  position: relative;
  overflow: hidden;
}

.pow-card.pow {
  background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03));
  border: 1px solid rgba(201,168,76,0.2);
}

.pow-card.pos {
  background: linear-gradient(135deg, rgba(74,140,191,0.06), rgba(74,140,191,0.02));
  border: 1px solid rgba(74,140,191,0.15);
}

.pow-badge {
  font-family: var(--font-impact);
  font-size: 13px;
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.pow-card.pow .pow-badge { color: var(--gold); }
.pow-card.pos .pow-badge { color: var(--blue); }

.pow-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.75;
  margin-bottom: 12px;
}

.pow-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  letter-spacing: 1px;
}

.pow-card.pow .pow-tag {
  background: var(--gold-dim);
  color: var(--gold);
}

.pow-card.pos .pow-tag {
  background: var(--blue-dim);
  color: var(--blue);
}

/* ─── FLOW DIAGRAM ─── */
.flow {
  display: flex;
  align-items: center;
  gap: 0;
  margin: 20px 0;
  overflow-x: auto;
  padding: 4px 0;
}

.flow-node {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  flex-shrink: 0;
  text-align: center;
}

.flow-node.highlight-node {
  border-color: rgba(201,168,76,0.3);
  background: var(--gold-glow);
  color: var(--gold-bright);
}

.flow-arrow {
  color: var(--text-tertiary);
  font-size: 16px;
  padding: 0 8px;
  flex-shrink: 0;
}

/* ─── NOTE ─── */
.note {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 14px;
}

.note strong { color: var(--text-primary); }

/* ─── CONCLUSION CARD ─── */
.conclusion-card {
  background: linear-gradient(135deg, #0f1118, #13161e);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: var(--radius-lg);
  padding: 40px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}

.conclusion-card::after {
  content: '₿';
  font-size: 200px;
  color: rgba(201,168,76,0.03);
  position: absolute;
  right: -20px; bottom: -40px;
  line-height: 1;
  pointer-events: none;
  font-family: sans-serif;
}

.conclusion-title {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--gold-bright);
  margin-bottom: 20px;
  line-height: 1.3;
}

.conclusion-body {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.85;
  max-width: 620px;
}

.conclusion-body strong { color: var(--text-primary); }

/* ─── CHECKLIST ─── */
.check-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }

.check-item {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  padding: 14px 18px;
  background: var(--bg-surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  font-size: 13.5px;
  color: var(--text-secondary);
  line-height: 1.65;
}

.check-icon {
  font-size: 15px;
  flex-shrink: 0;
  margin-top: 1px;
}

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.btn {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--text-secondary);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 18px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn:hover {
  border-color: var(--border-hover);
  color: var(--text-primary);
}

.btn-primary {
  background: var(--gold-dim);
  border-color: rgba(201,168,76,0.3);
  color: var(--gold);
}

.btn-primary:hover {
  background: rgba(201,168,76,0.18);
  color: var(--gold-bright);
}

.page-indicator {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
}

/* ─── RESPONSIVE ─── */
@media (max-width: 640px) {
  .metrics { grid-template-columns: 1fr 1fr; }
  .pow-pos-grid { grid-template-columns: 1fr; }
  .sec-title { font-size: 26px; }
  .flow { flex-wrap: wrap; gap: 8px; }
  .flow-arrow { display: none; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">REPORT <em>// </em>2026.04</div>
    <div class="header-tag">STRATEGY · BITCOIN · DEFENSE</div>
  </div>
</header>

<nav class="nav-strip">
  <div class="nav-tabs" id="navTabs"></div>
</nav>

<main class="main" id="main"></main>

<script>
const sections = [
  {
    tab: "개요",

              <div class="tl-title">Lowery 소령 MIT 논문 — Softwar</div>

          </div>
          <div class="tl-item">
            <div class="tl-year">2024</div>
            <div class="tl-spine"><div class="tl-dot" style="border-color:var(--orange)"></div><div class="tl-line"></div></div>

              <div class="tl-desc">비트코인 전략비축 공약, 국가 채굴 지원, SEC 적대정책 폐기 약속. 비트코인 커뮤니티의 공식 지지 확보.</div>
            </div>
          </div>
          <div class="tl-item">
            <div class="tl-year">2025.03</div>
            <div class="tl-spine"><div class="tl-dot" style="border-color:var(--green)"></div><div class="tl-line"></div></div>

const navEl = document.getElementById('navTabs');
const mainEl = document.getElementById('main');

sections.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'nav-tab' + (i === 0 ? ' active' : '');
  btn.textContent = s.tab;
  btn.onclick = () => showSection(i);
  navEl.appendChild(btn);

  const div = document.createElement('div');
  div.className = 'section' + (i === 0 ? ' active' : '');
  div.innerHTML = `
    <div class="sec-header">
      <div class="sec-eyebrow">
        <span class="sec-num">${s.num}</span>
        <span class="sec-tag">${s.tag}</span>
      </div>
      <div class="gold-rule"></div>
      <h2 class="sec-title">${s.title.replace(/\n/g, '<br>')}</h2>
      <p class="sec-subtitle">${s.subtitle}</p>
    </div>
    ${s.content}
    <div class="bottom-nav">
      <button class="btn" onclick="showSection(${i > 0 ? i-1 : sections.length-1})" ${i===0?'style="visibility:hidden"':''}>← 이전</button>
      <span class="page-indicator">${i+1} / ${sections.length}</span>
      <button class="btn btn-primary" onclick="showSection(${i < sections.length-1 ? i+1 : 0})">${i < sections.length-1 ? '다음 →' : '처음으로'}</button>
    </div>
  `;
  mainEl.appendChild(div);
});

function showSection(idx) {
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.section').forEach((s,i) => s.classList.toggle('active', i===idx));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
