<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>양자컴퓨터 섹터 입문 가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0b0f;
  --bg-card: #12131a;
  --bg-card-hover: #181924;
  --bg-surface: #1a1b24;
  --bg-accent: rgba(99,179,237,0.06);
  --text-primary: #e8e6e1;
  --text-secondary: #8a8b95;
  --text-tertiary: #55566a;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --blue: #63b3ed;
  --blue-dim: rgba(99,179,237,0.15);
  --green: #68d391;
  --green-dim: rgba(104,211,145,0.12);
  --amber: #f6ad55;
  --amber-dim: rgba(246,173,85,0.12);
  --red: #fc8181;
  --red-dim: rgba(252,129,129,0.12);
  --purple: #b794f4;
  --purple-dim: rgba(183,148,244,0.12);
  --teal: #4fd1c5;
  --teal-dim: rgba(79,209,197,0.12);
  --radius: 10px;
  --radius-lg: 16px;
  --font-body: 'Noto Sans KR', -apple-system, sans-serif;
  --font-display: 'Playfair Display', serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  line-height: 1.7;
  font-size: 15px;
  min-height: 100vh;
}

::selection { background: var(--blue-dim); color: var(--blue); }

/* ─── HEADER ─── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(10,11,15,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.logo {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--blue);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.logo span { color: var(--text-tertiary); }

/* ─── NAV TABS ─── */
.nav-strip {
  position: fixed;
  top: 56px; left: 0; right: 0;
  z-index: 99;
  background: rgba(10,11,15,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.nav-strip::-webkit-scrollbar { display: none; }

.nav-tabs {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  gap: 2px;
  min-width: max-content;
}

.nav-tab {
  font-family: var(--font-body);
  font-size: 12.5px;
  font-weight: 400;
  color: var(--text-tertiary);
  background: transparent;
  border: none;
  padding: 12px 16px;
  cursor: pointer;
  white-space: nowrap;
  position: relative;
  transition: color 0.25s;
  letter-spacing: 0.3px;
}

.nav-tab:hover { color: var(--text-secondary); }

.nav-tab.active {
  color: var(--text-primary);
  font-weight: 500;
}

.nav-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 16px; right: 16px;
  height: 2px;
  background: var(--blue);
  border-radius: 2px 2px 0 0;
}

/* ─── MAIN CONTENT ─── */
.main {
  max-width: 960px;
  margin: 0 auto;
  padding: 130px 24px 80px;
}

/* ─── SECTIONS ─── */
.section {
  display: none;
  animation: sectionIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.section.active { display: block; }

@keyframes sectionIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── SECTION HEADER ─── */
.sec-header {
  margin-bottom: 40px;
}

.sec-number {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--blue);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.sec-title {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
  letter-spacing: -0.5px;
}

.sec-subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  margin-top: 12px;
  line-height: 1.7;
  max-width: 640px;
}

/* ─── CARDS ─── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  margin-bottom: 16px;
  transition: border-color 0.3s, background 0.3s;
}

.card:hover {
  border-color: var(--border-hover);
  background: var(--bg-card-hover);
}

.card-title {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-accent-left {
  border-left: 3px solid;
  border-radius: var(--radius-lg);
}

/* ─── ANALOGY BOX ─── */
.analogy {
  background: var(--bg-accent);
  border: 1px solid rgba(99,179,237,0.1);
  border-radius: var(--radius-lg);
  padding: 28px;
  margin-bottom: 20px;
}

.analogy-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--blue);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.analogy-text {
  font-size: 16px;
  line-height: 1.8;
  color: var(--text-primary);
}

.analogy-sub {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-top: 10px;
}

/* ─── TAGS ─── */
.tag {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}

.tag-blue { background: var(--blue-dim); color: var(--blue); }
.tag-green { background: var(--green-dim); color: var(--green); }
.tag-amber { background: var(--amber-dim); color: var(--amber); }
.tag-red { background: var(--red-dim); color: var(--red); }
.tag-purple { background: var(--purple-dim); color: var(--purple); }
.tag-teal { background: var(--teal-dim); color: var(--teal); }

/* ─── METRICS ─── */
.metrics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.metric {
  background: var(--bg-surface);
  border-radius: var(--radius);
  padding: 20px;
}

.metric-label {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}

.metric-value {
  font-family: var(--font-mono);
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -1px;
}

.metric-sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ─── PRINCIPLE ITEMS ─── */
.principle {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
  align-items: flex-start;
}

.principle-num {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  flex-shrink: 0;
}

.principle-title {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 4px;
}

.principle-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* ─── PROGRESS BARS ─── */
.prog-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 8px 0;
}

.prog-label {
  font-size: 13px;
  color: var(--text-secondary);
  min-width: 80px;
}

.prog-track {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.04);
  border-radius: 3px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}

.prog-val {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-tertiary);
  min-width: 48px;
  text-align: right;
}

/* ─── TIMELINE ─── */
.timeline {
  position: relative;
  padding-left: 32px;
  margin: 20px 0;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 8px;
  bottom: 8px;
  width: 1px;
  background: var(--border-hover);
}

.tl-item {
  position: relative;
  margin-bottom: 28px;
}

.tl-item:last-child { margin-bottom: 0; }

.tl-dot {
  position: absolute;
  left: -27px;
  top: 6px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid;
}

.tl-year {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: 4px;
  letter-spacing: 1px;
}

.tl-title {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 4px;
}

.tl-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* ─── LOSS METER ─── */
.loss-block {
  margin: 14px 0;
}

.loss-label {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.loss-bar-track {
  height: 24px;
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}

.loss-bar-fill {
  height: 100%;
  border-radius: 12px;
  transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--bg-deep);
  min-width: fit-content;
}

/* ─── COMPARE TABLE ─── */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.compare-table th {
  text-align: center;
  font-weight: 500;
  padding: 12px 10px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-hover);
  font-size: 12px;
  letter-spacing: 0.5px;
}

.compare-table th:first-child { text-align: left; }

.compare-table td {
  padding: 12px 10px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
  line-height: 1.5;
}

.compare-table td:first-child {
  text-align: left;
  color: var(--text-tertiary);
  font-size: 12px;
}

.compare-table tr:last-child td { border-bottom: none; }

/* ─── GRID LAYOUTS ─── */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}

.grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

@media (max-width: 640px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .sec-title { font-size: 26px; }
  .main { padding: 120px 16px 60px; }
  .card { padding: 20px; }
}

/* ─── NOTE BOX ─── */
.note {
  background: var(--amber-dim);
  border: 1px solid rgba(246,173,85,0.15);
  border-radius: var(--radius);
  padding: 16px 20px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--amber);
  margin: 20px 0;
}

/* ─── CHECKLIST ─── */
.check-item {
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
}

.check-item:last-child { border-bottom: none; }

.check-num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}

.check-title {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 6px;
}

.check-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* ─── STATUS DOTS ─── */
.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 6px 0;
  font-size: 13px;
  line-height: 1.6;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.btn {
  font-family: var(--font-body);
  font-size: 13px;
  padding: 10px 20px;
  border-radius: var(--radius);
  border: 1px solid var(--border-hover);
  background: transparent;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}

.btn:hover { background: var(--bg-surface); border-color: var(--text-tertiary); }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--blue-dim);
  color: var(--blue);
  border-color: rgba(99,179,237,0.2);
}

.btn-primary:hover {
  background: rgba(99,179,237,0.2);
}

/* ─── VS BOX ─── */
.vs-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}

.vs-side {
  padding: 24px;
  text-align: center;
}

.vs-side:first-child { border-right: 1px solid var(--border); }

.vs-icon { font-size: 36px; margin-bottom: 12px; }

.vs-label {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 8px;
}

.vs-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ─── FOOTER ─── */
.footer {
  max-width: 960px;
  margin: 0 auto;
  padding: 24px;
  text-align: center;
  font-size: 12px;
  color: var(--text-tertiary);
  border-top: 1px solid var(--border);
}

/* ─── APPROACH CARDS ─── */
.approach-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 12px;
  transition: border-color 0.3s;
}

.approach-card:hover { border-color: var(--border-hover); }

.approach-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.approach-title {
  font-size: 15px;
  font-weight: 500;
}

.approach-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 10px;
}

.approach-meta {
  font-size: 12px;
  color: var(--text-tertiary);
}

.glow-line {
  width: 48px;
  height: 2px;
  border-radius: 1px;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo">Quantum<span> / 입문 가이드</span></div>
    <span style="font-size:12px;color:var(--text-tertiary)">Based on Xanadu ($XNDU) Analysis</span>
  </div>
</header>

<!-- NAV -->
<nav class="nav-strip">
  <div class="nav-tabs" id="navTabs"></div>
</nav>

<!-- MAIN -->
<main class="main" id="main"></main>

<!-- FOOTER -->
<footer class="footer">
  이 가이드는 공개된 Nature 논문 및 SEC 공시 자료를 기반으로 작성된 교육용 문서입니다. 투자 권유가 아닙니다.
</footer>

<script>
const sections = [
  {
    tab: "양자컴퓨터란?",
    num: "01",
    title: "양자컴퓨터란 무엇인가",
    subtitle: "0과 1을 동시에 가지는 컴퓨터. 비트 대신 큐빗을 씁니다.",
    color: "--blue",
    content: `
      <div class="analogy">
        <div class="analogy-label">핵심 개념</div>
        <div class="analogy-text">일반 컴퓨터는 <strong>스위치</strong>로 작동합니다. 켜짐(1) 아니면 꺼짐(0). 이걸 <strong>비트(bit)</strong>라고 해요.</div>
        <div class="analogy-sub">양자컴퓨터는 <strong>큐빗(qubit)</strong>을 씁니다. 0과 1을 <em>동시에</em> 가질 수 있어요. 동전을 손바닥 위에 놓으면 앞면 또는 뒷면이지만, 공중에서 회전 중일 땐 앞면이면서 뒷면인 상태 — 그게 큐빗입니다.</div>
      </div>

      <div class="card">
        <div class="card-title">비유로 이해하기: 미로 찾기</div>
        <div class="vs-grid">
          <div class="vs-side">
            <div class="vs-icon">🚶</div>
            <div class="vs-label" style="color:var(--blue)">일반 컴퓨터</div>
            <div class="vs-desc">한 사람이 미로를 한 길씩 순서대로 시도합니다. 길이 100개면 최악의 경우 100번 시도.</div>
          </div>
          <div class="vs-side">
            <div class="vs-icon">👥</div>
            <div class="vs-label" style="color:var(--green)">양자컴퓨터</div>
            <div class="vs-desc">분신술처럼 모든 길을 <em>동시에</em> 탐색합니다. 100개 길을 한 번에. 이걸 <strong>중첩</strong>이라 해요.</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">양자컴퓨터의 3가지 핵심 원리</div>
        <div class="principle">
          <div class="principle-num" style="background:var(--blue-dim);color:var(--blue)">1</div>
          <div>
            <div class="principle-title">중첩 (Superposition)</div>
            <div class="principle-desc">0과 1을 동시에 가지는 상태. 큐빗 N개면 2의 N제곱 가지 상태를 동시에 표현할 수 있습니다. 큐빗 300개면 우주의 원자 수보다 많은 상태를 한 번에 다룹니다.</div>
          </div>
        </div>
        <div class="principle">
          <div class="principle-num" style="background:var(--green-dim);color:var(--green)">2</div>
          <div>
            <div class="principle-title">얽힘 (Entanglement)</div>
            <div class="principle-desc">두 큐빗이 연결되면, 하나를 측정하면 다른 하나의 상태도 즉시 결정됩니다. 거리와 무관해요. 아인슈타인이 "유령 같은 원격 작용"이라고 불렀던 현상입니다.</div>
          </div>
        </div>
        <div class="principle">
          <div class="principle-num" style="background:var(--amber-dim);color:var(--amber)">3</div>
          <div>
            <div class="principle-title">간섭 (Interference)</div>
            <div class="principle-desc">정답 확률은 높이고, 오답 확률은 낮추는 기술. 파도의 보강/상쇄 간섭과 같은 원리입니다. 양자 알고리즘은 결국 이 간섭을 정교하게 조율하는 작업이에요.</div>
          </div>
        </div>
      </div>

      <div class="analogy">

// Render
const navEl = document.getElementById('navTabs');
const mainEl = document.getElementById('main');

sections.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'nav-tab' + (i === 0 ? ' active' : '');
  btn.textContent = s.tab;
  btn.onclick = () => showSection(i);
  navEl.appendChild(btn);

  const div = document.createElement('div');
  div.className = 'section' + (i === 0 ? ' active' : '');
  div.innerHTML = `
    <div class="sec-header">
      <div class="sec-number">${s.num}</div>
      <div class="glow-line" style="background:var(${s.color})"></div>
      <h2 class="sec-title">${s.title}</h2>
      <p class="sec-subtitle">${s.subtitle}</p>
    </div>
    ${s.content}
    <div class="bottom-nav">
      <button class="btn" onclick="showSection(${i > 0 ? i - 1 : sections.length - 1})" ${i === 0 ? 'style="visibility:hidden"' : ''}>&larr; 이전</button>
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--text-tertiary)">${i + 1} / ${sections.length}</span>
      <button class="btn btn-primary" onclick="showSection(${i < sections.length - 1 ? i + 1 : 0})">${i < sections.length - 1 ? '다음 &rarr;' : '처음으로'}</button>
    </div>
  `;
  mainEl.appendChild(div);
});

function showSection(idx) {
  document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === idx));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
