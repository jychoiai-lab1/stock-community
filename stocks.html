<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주식 현황 - 겁쟁이리서치</title>
  <meta name="description" content="S&P500 섹터 히트맵, 코스피 마켓맵 등 오늘의 주식 현황을 한눈에" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="겁쟁이리서치" />
  <meta property="og:title" content="주식 현황 - 겁쟁이리서치" />
  <meta property="og:description" content="S&P500 섹터 히트맵, 코스피 마켓맵 등 오늘의 주식 현황" />
  <meta property="og:url" content="https://stock-community-woad.vercel.app/stocks.html" />
  <meta name="twitter:card" content="summary" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">📈 겁쟁이리서치</div>
      <nav class="nav">
        <a href="index.html" class="nav-link">홈</a>
        <a href="stocks.html" class="nav-link active">주식 현황</a>
        <a href="board.html" class="nav-link">자유게시판</a>
      </nav>
    </div>
  </header>
  <main class="main">
    <div class="container">
      <section class="stocks-section">
        <div class="stocks-header">
          <h2 class="section-title">오늘의 주식 현황</h2>
          <button class="refresh-btn" id="refreshBtn" onclick="handleRefresh()">
            <span id="refreshBtnText">🔄 히트맵 갱신</span>
          </button>
        </div>
        <p class="refresh-status" id="refreshStatus"></p>

        <!-- Barchart 섹터 퍼포먼스 -->
        <div class="finviz-map-wrap">
          <div class="finviz-map-header">
            <span class="finviz-map-title">📈 S&P500 섹터 퍼포먼스</span>
            <span class="finviz-map-note">Today · 5D · 1M · 3M · Barchart</span>
          </div>
          <img
            src="https://miyrssfrjvhwswjylahw.supabase.co/storage/v1/object/public/images/barchart_sectors.png"
            alt="Barchart Sector Performance"
            class="finviz-map-img"
            onerror="this.parentElement.style.display='none'"
            referrerpolicy="no-referrer"
          />
        </div>

        <!-- Finviz 섹터 히트맵 -->
        <div class="finviz-map-wrap">
          <div class="finviz-map-header">
            <span class="finviz-map-title">📊 S&P500 섹터 히트맵</span>
            <span class="finviz-map-note">매일 자동 갱신 · Finviz</span>
          </div>
          <img
            src="https://miyrssfrjvhwswjylahw.supabase.co/storage/v1/object/public/images/finviz_map.png"
            alt="Finviz Market Map"
            class="finviz-map-img"
            onerror="this.parentElement.style.display='none'"
            referrerpolicy="no-referrer"
          />
        </div>
        <!-- 코스피 마켓맵 -->
        <div class="finviz-map-wrap">
          <div class="finviz-map-header">
            <span class="finviz-map-title">🇰🇷 코스피 마켓맵</span>
            <span class="finviz-map-note">매일 자동 갱신 · 한국경제</span>
          </div>
          <img
            src="https://miyrssfrjvhwswjylahw.supabase.co/storage/v1/object/public/images/kospi_map.png"
            alt="코스피 마켓맵"
            class="finviz-map-img"
            onerror="this.parentElement.style.display='none'"
            referrerpolicy="no-referrer"
          />
        </div>
      </section>
    </div>
  </main>
  <!-- 모바일 하단 네비게이션 -->
  <nav class="mobile-nav">
    <div class="mobile-nav-items">
      <a href="index.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">🏠</span>홈
      </a>
      <a href="stocks.html" class="mobile-nav-item active">
        <span class="mobile-nav-icon">📊</span>주식현황
      </a>
      <a href="board.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">💬</span>게시판
      </a>
    </div>
  </nav>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="stocks.js"></script>
  <script src="animations.js"></script>
  <script src="toast.js"></script>
</body>
</html>
